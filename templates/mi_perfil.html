<!DOCTYPE html>
<html>
<head>
    <title>Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Mi Perfil</h2>

    <form method="POST">

        <input type="text" name="nombre" value="{{ empleado[1] }}" class="form-control mb-2" required>

        <input type="text" name="apellido" value="{{ empleado[3] }}" class="form-control mb-2" required>

        <input type="text" name="cargo" value="{{ empleado[4] }}" class="form-control mb-2" required>

        <input type="text" name="departamento" value="{{ empleado[11] }}" class="form-control mb-2" required>

        <input type="number" value="{{ empleado[6] }}" class="form-control mb-2" disabled>

        <input type="number" value="{{ empleado[7] }}" class="form-control mb-2" disabled>

        <input type="number" value="{{ empleado[5] }}" class="form-control mb-2" disabled>

        <input type="number" value="{{ empleado[10] }}" class="form-control mb-2" disabled>

        <button class="btn btn-success">Actualizar</button>

    </form>

    <a href="{{ url_for('inicio') }}" class="btn btn-secondary mt-2">Volver</a>

</div>

</body>
</html>
