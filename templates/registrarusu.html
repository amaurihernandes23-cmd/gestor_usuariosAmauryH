<!DOCTYPE html>
<html>
    <head>
        <title>Principal</title>
        <meta charset="UTF-8">
        <!--llamar al estilo de la pagina-->
        <link rel = "stylesheet" href="{{url_for('static', filename='style.css')}}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
<!--creamos el modal-->
            <div class="modal" id="myModal">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <!--definir el header-->
                        <div class="modal-header">
                            <h4 class="modal-title">REGISTRO DE USUARIOS</h4>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>    
                        </div>
                        <!--definir el cuerpo del modal---formulario-->
                        <div class="modal-body">
                        <form method="POST" action="{{ url_for('guardar_usuario') }}">
                            <div class="mb-3 mt-3">
                                <label>Ingresar Nombre de Usuario</label>
                                <input type="text" class="form-control" name="txtnombre" placeholder="Ingresar Usuario">
                            </div>
                            <div class="mb-3">
                                <label>Ingresar Contraseña:</label>
                                <input type="password" class="form-control" placeholder="Ingresar password" name="txtcontraseña">
                            </div>
                            <div class="mb-3">
                                <label>ROl:</label>
                                <select class="form-select" name="txtrol" required>
                                    <option value="">Seleccione el ROL:</option>
                                    <option value="admin">Administrador</option>
                                    <option value="empleado">Empleado</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label>Ingresar Documento:</label>
                                <input type="number" class="form-control" placeholder="Ingresar Documento usuario " name="documento">
                            </div><button type="submit" class="btn-dark" data-bs-dismiss="modal">REGISTRAR</button> 
                        </form>

                    </div>
                    </div>
                    
                    <!--definir el pie de pagina del formulario-->
                    <div class="modal-footer">
                          
                    </div>
                </div>

            </div>
        </body>
</html>
