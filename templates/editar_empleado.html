<!DOCTYPE html>
<html>
<head>
    <title>Editar Empleado</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Editar Empleado</h2>

<form method="POST" action="{{ url_for('editar_empleado', id=empleado[0]) }}">

    <div class="mb-3">
        <label>Documento</label>
        <input type="number" name="documento" class="form-control" value="{{empleado[1]}}" required>
    </div>

    <div class="mb-3">
        <label>Nombre</label>
        <input type="text" name="nombre" class="form-control" value="{{empleado[2]}}" required>
    </div>

    <div class="mb-3">
        <label>Apellido</label>
        <input type="text" name="apellido" class="form-control" value="{{empleado[3]}}" required>
    </div>

<div class="mb-3">
    <label>Horas extra</label>
    <input type="number" name="hora_extra" class="form-control" value="{{empleado[6]}}" required>
</div>

<div class="mb-3">
    <label>Bonificación</label>
    <input type="number" step="0.01" name="bonificacion" class="form-control" value="{{empleado[7]}}" required>
</div>

<div class="mb-3">
    <label>Departamento</label>
    <input type="text" name="departamento" class="form-control" value="{{empleado[10]}}" required>
</div>

    <button type="submit" class="btn btn-primary">Actualizar</button>
    <a href="{{ url_for('inicio') }}" class="btn btn-danger">Cancelar</a>

</form>

</body>
</html>
